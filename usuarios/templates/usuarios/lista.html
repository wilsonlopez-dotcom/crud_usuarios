<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
    tr:hover { background: #f5f5f5; }
    .btn { padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; }
    .btn-crear { background: #28a745; color: white; display: inline-block; margin-bottom: 16px; }
    .btn-editar { background: #ffc107; color: #333; }
    .btn-eliminar { background: #dc3545; color: white; }
  </style>
</head>
<body>
  <h1>👥 Lista de Usuarios</h1>
  <a href="{% url 'crear_usuario' %}" class="btn btn-crear">+ Nuevo Usuario</a>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for usuario in usuarios %}
      <tr>
        <td>{{ usuario.id }}</td>
        <td>{{ usuario.nombre }}</td>
        <td>{{ usuario.apellido }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.telefono }}</td>
        <td>
          <a href="{% url 'editar_usuario' usuario.pk %}" class="btn btn-editar">✏️ Editar</a>
          <a href="{% url 'eliminar_usuario' usuario.pk %}" class="btn btn-eliminar">🗑️ Eliminar</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="6" style="text-align:center; color:#999;">No hay usuarios registrados.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
