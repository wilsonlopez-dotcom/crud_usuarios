<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ accion }} Usuario</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    label { display: block; margin-top: 14px; font-weight: bold; color: #555; }
    input { width: 100%; padding: 9px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .btn-guardar { margin-top: 20px; background: #4a90d9; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    .btn-guardar:hover { background: #357abd; }
    .btn-volver { display: inline-block; margin-top: 12px; color: #666; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <h1>{{ accion }} Usuario</h1>
  <form method="POST">
    {% csrf_token %}
    <label>Nombre</label>
    <input type="text" name="nombre" value="{{ usuario.nombre }}" required>

    <label>Apellido</label>
    <input type="text" name="apellido" value="{{ usuario.apellido }}" required>

    <label>Email</label>
    <input type="email" name="email" value="{{ usuario.email }}" required>

    <label>Teléfono</label>
    <input type="text" name="telefono" value="{{ usuario.telefono }}" required>

    <button type="submit" class="btn-guardar">💾 Guardar</button>
  </form>
  <a href="{% url 'lista_usuarios' %}" class="btn-volver">← Volver a la lista</a>
</body>
</html>
