<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Usuario</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 450px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff3f3; border: 1px solid #f5c6cb; border-radius: 8px; padding: 24px; margin-top: 20px; }
    h1 { color: #dc3545; }
    p { color: #555; }
    strong { color: #333; }
    .btn-eliminar { background: #dc3545; color: white; padding: 10px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    .btn-volver { display: inline-block; margin-left: 12px; color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <h1>⚠️ Confirmar eliminación</h1>
  <div class="card">
    <p>¿Estás seguro que deseas eliminar al usuario:</p>
    <p><strong>{{ usuario.nombre }} {{ usuario.apellido }}</strong> ({{ usuario.email }})?</p>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn-eliminar">🗑️ Sí, eliminar</button>
    </form>
    <a href="{% url 'lista_usuarios' %}" class="btn-volver">← Cancelar</a>
  </div>
</body>
</html>
